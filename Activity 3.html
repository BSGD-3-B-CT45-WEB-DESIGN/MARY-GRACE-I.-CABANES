<!DOCTYPE html>
<html>

<head>
  <title>CSS External</title>
  <link rel="stylesheet" href="style.css">
  

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      transition: all 0.15s ease;
      margin-top: 10px;
    }

    .uber-button {
      background-color: black;
      color: white;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
    }

    .uber-button:hover {
      opacity: 0.8;
    }

    .uber-button:active {
      opacity: 0.6;
      transform: scale(0.97);
    }

    .amazon-button {
      background-color: rgb(255, 216, 20);
      border: none;
      padding: 10px 40px;
      border-radius: 20px;
      cursor: pointer;
    }

    .amazon-button:hover {
      background-color: rgb(245, 205, 3);
    }

    .amazon-button:active {
      background-color: rgb(230, 190, 0);
      transform: scale(0.96);
    }

    .github-button {
      background-color: rgb(46, 164, 79);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .github-button:hover {
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    }

    .github-button:active {
      box-shadow: 0px 2px 4px rgba(0,0,0,0.2);
      transform: translateY(2px);
    }

    .bootstrap-get {
      background-color: rgb(121, 82, 179);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 4px;
      cursor: pointer;
    }

    .bootstrap-get:hover {
      background-color: rgb(100, 60, 160);
    }

    .bootstrap-get:active {
      background-color: rgb(80, 50, 140);
      transform: scale(0.96);
    }

    .bootstrap-download {
      background-color: white;
      color: rgb(108, 117, 125);
      border: 1px solid rgb(108, 117, 125);
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
    }

    .bootstrap-download:hover {
      background-color: rgb(108, 117, 125);
      color: white;
    }

    .bootstrap-download:active {
      background-color: rgb(90, 100, 110);
      transform: scale(0.96);
    }

    .linkedin-apply {
      background-color: rgb(10, 102, 194);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .linkedin-apply:hover {
      background-color: rgb(8, 85, 160);
    }

    .linkedin-apply:active {
      background-color: rgb(7, 70, 140);
      transform: scale(0.96);
    }

    .linkedin-save {
      background-color: white;
      color: rgb(10, 102, 194);
      border: 1px solid rgb(10, 102, 194);
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .linkedin-save:hover {
      border-width: 2px;
      background-color: rgba(10, 102, 194, 0.1);
    }

    .linkedin-save:active {
      background-color: rgba(10, 102, 194, 0.2);
      transform: scale(0.96);
    }
  </style>
</head>

<body>

  <button class="uber-button">Request now</button>
  <br>

  <button class="amazon-button">Add to Cart</button>
  <br>

  <button class="github-button">Sign up</button>
  <br>

  <button class="bootstrap-get">Get started</button>
  <button class="bootstrap-download">Download</button>
  <br>

  <button class="linkedin-apply">Apply on company website</button>
  <button class="linkedin-save">Save</button>

</body>
</html>
