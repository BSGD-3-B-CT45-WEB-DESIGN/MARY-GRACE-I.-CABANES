<!DOCTYPE html>
<html>
<head>
<title>CSS Basic</title>
<style>
.uber-button {
background-color: black;
color: white;
border: 2px solid white;
padding: 12px 20px;
cursor: pointer;
margin-top: 10px;
}
.amazon-button {
background-color: rgb(255, 216, 20);
border: none;
padding: 10px 40px;
border-radius: 20px;
cursor: pointer;
margin-top: 10px;
}
.github-button {
background-color: rgb(46, 164, 79);
color: white;
border: none;
padding: 10px 20px;
border-radius: 6px;
font-weight: bold;
cursor: pointer;
margin-top: 10px;
}
.bootstrap-get {
background-color: rgb(121, 82, 179);
color: white;
border: none;
padding: 10px 18px;
border-radius: 4px;
margin-top: 10px;
cursor: pointer;
}
.bootstrap-download {
background-color: white;
color: rgb (108, 117, 125);

border: 1px solid rgb (108, 117, 125);
padding: 10px 20px;
border-radius: 4px;
margin-top: 10px;
cursor: pointer;
}
.linkedin-apply {
background-color: rgb(10, 102, 194);
color: white;
border: none;
padding: 10px 25px;
border-radius: 20px;
font-weight: bold;
cursor: pointer;
margin-top: 10px;
}
.linkedin-save {
background-color: white;
color: rgb(10, 102, 194);
border: 1px solid rgb(10, 102, 194);
padding: 10px 20px;
border-radius: 20px;
font-weight: bold;
cursor: pointer;
margin-top: 10px;
}
</style>
</head>
<button class="uber-button">
Request now
</button>
<br>
<button class="amazon-button">
Add to Cart
</button>
<br>
<button class="github-button">
Sign up
</button>

<br>
<button class="bootstrap-get">
Get started
</button>
<button class="bootstrap-download">
Download
</button>
<br>
<button class="linkedin-apply">
Apply on company website
</button>
<button class="linkedin-save">
Save
</button>
</body>
